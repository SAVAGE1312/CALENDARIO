<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendario Colaborativo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#f4f3ff;color:#1a1a2e;min-height:100vh;padding:1.25rem}
.header{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;flex-wrap:wrap}
.header h1{font-size:1.5rem;font-weight:700;flex:1;background:linear-gradient(90deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-btn{background:#fff;border:none;border-radius:10px;padding:7px 14px;cursor:pointer;font-size:1rem;color:#6366f1;font-weight:600;transition:all .15s;box-shadow:0 1px 4px rgba(99,102,241,.12)}
.nav-btn:hover{background:#6366f1;color:#fff;transform:scale(1.05)}
.today-btn{font-size:.82rem;padding:7px 16px}
.sync-label{font-size:.72rem;color:#999;display:flex;align-items:center;gap:5px;background:#fff;padding:5px 10px;border-radius:20px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;transition:background .3s}
.sync-dot.stale{background:#f59e0b}
.facturacion-bar{background:#fff;border-radius:14px;padding:14px 20px;margin-bottom:1.1rem;box-shadow:0 1px 6px rgba(99,102,241,.1)}
.fact-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.fact-label{font-size:.75rem;color:#a0a0b8;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.fact-amount{font-size:1.9rem;font-weight:700;background:linear-gradient(90deg,#22c55e,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em;line-height:1}
.fact-days{font-size:.72rem;color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;padding:3px 10px;border-radius:20px;font-weight:600;margin-left:auto}
.fact-bottom{display:flex;gap:10px;flex-wrap:wrap}
.fact-sub{display:flex;align-items:center;gap:8px;background:#f8f8ff;border-radius:10px;padding:8px 14px;flex:1;min-width:130px;border:1px solid #ede9fe}
.fact-sub-icon{font-size:1.1rem}
.fact-sub-label{font-size:.68rem;color:#a0a0b8;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fact-sub-amount{font-size:1rem;font-weight:700;color:#1a1a2e}
.fact-sub.efectivo .fact-sub-amount{color:#16a34a}
.fact-sub.datafono .fact-sub-amount{color:#6366f1}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.leg{display:flex;align-items:center;gap:5px;font-size:.73rem;font-weight:500;color:#555;background:#fff;padding:4px 10px;border-radius:20px}
.leg-dot{width:8px;height:8px;border-radius:50%}
.grid-head{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.grid-head span{text-align:center;font-size:.72rem;color:#a0a0b8;font-weight:600;padding:4px 0;letter-spacing:.04em;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day{border:none;border-radius:12px;min-height:95px;padding:8px;cursor:pointer;background:#fff;position:relative;transition:all .18s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.day:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(99,102,241,.13)}
.day.other{opacity:.35;box-shadow:none}
.day.other:hover{transform:none;box-shadow:none}
.day.weekend .day-num{color:#8b5cf6}
.day.today{background:linear-gradient(135deg,#ede9fe,#f4f3ff);box-shadow:0 0 0 2px #8b5cf6}
.day.today .day-num{background:#8b5cf6;color:#fff;border-radius:8px}
.day-num{font-size:.82rem;font-weight:700;margin-bottom:5px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.btn-plus{position:absolute;top:6px;right:7px;background:none;border:none;font-size:1.1rem;color:#d0d0e8;cursor:pointer;line-height:1;padding:0;transition:all .15s}
.btn-plus:hover{color:#6366f1;transform:scale(1.3)}
.caja-badge{position:absolute;bottom:6px;right:4px;font-size:.58rem;font-weight:700;color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:2px 5px;display:flex;align-items:center;gap:2px;white-space:nowrap}
.ev-pill{font-size:.67rem;font-weight:600;border-radius:6px;padding:2px 6px;margin-bottom:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:3px}
.ev-pill:hover{opacity:.82}
.ev-pill.done{opacity:.55;text-decoration:line-through}
.pill-tick{font-size:.65rem;flex-shrink:0}
.more{font-size:.63rem;color:#b0b0c8;margin-top:2px;font-weight:500}
#dayPanel{margin-top:1.5rem;background:#fff;border-radius:16px;padding:1.25rem;box-shadow:0 4px 20px rgba(99,102,241,.08);display:none}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.panel-header h2{font-size:1rem;font-weight:700;color:#1a1a2e}
.panel-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#c0c0d8;transition:color .15s}
.panel-close:hover{color:#6366f1}
.panel-empty{font-size:.85rem;color:#c0c0d8;text-align:center;padding:1.5rem 0}
.caja-section{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:12px;padding:14px 16px;margin-bottom:1rem}
.caja-section-title{font-size:.75rem;font-weight:700;color:#15803d;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.caja-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.caja-field-label{font-size:.7rem;font-weight:700;color:#15803d;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.caja-input-row{display:flex;align-items:center;gap:6px}
.caja-prefix{font-size:1rem;font-weight:700;color:#15803d}
.caja-input{flex:1;border:2px solid #86efac;border-radius:9px;padding:7px 10px;font-size:.95rem;font-family:inherit;background:#fff;color:#15803d;font-weight:600;transition:border-color .15s;width:100%}
.caja-input:focus{outline:none;border-color:#22c55e}
.caja-total-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:9px;padding:8px 12px;border:1.5px solid #86efac;margin-bottom:10px}
.caja-total-label{font-size:.75rem;font-weight:700;color:#15803d}
.caja-total-amount{font-size:1.1rem;font-weight:700;color:#15803d}
.btn-caja-save{background:#22c55e;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
.btn-caja-save:hover{background:#16a34a;transform:scale(1.02)}
.caja-saved{display:flex;align-items:flex-start;gap:8px;margin-top:8px;flex-wrap:wrap}
.caja-saved-main{font-size:.8rem;color:#15803d;font-weight:600;flex:1}
.caja-saved-subs{font-size:.73rem;color:#16a34a;display:flex;gap:10px;flex-wrap:wrap;margin-top:2px}
.btn-caja-del{background:none;border:none;font-size:.75rem;color:#a0a0b8;cursor:pointer;transition:color .15s;white-space:nowrap}
.btn-caja-del:hover{color:#ef4444}
.ev-card{display:flex;gap:12px;align-items:center;background:#faf9ff;border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid #ede9fe;transition:all .2s}
.ev-card:hover{box-shadow:0 3px 12px rgba(99,102,241,.1)}
.ev-card.done{background:#f0fdf4;border-color:#bbf7d0;opacity:.85}
.ev-card-bar{width:4px;border-radius:4px;align-self:stretch;flex-shrink:0;min-height:40px}
.ev-card-body{flex:1;min-width:0}
.ev-card-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.ev-cat-badge{font-size:.68rem;font-weight:700;border-radius:20px;padding:2px 8px;color:#fff;letter-spacing:.02em}
.ev-time{font-size:.74rem;color:#a0a0b8;font-weight:500}
.ev-resp{font-size:.74rem;color:#a0a0b8;font-weight:500}
.ev-title{font-size:.9rem;font-weight:600;color:#1a1a2e}
.ev-card.done .ev-title{text-decoration:line-through;color:#6b7280}
.ev-nota{font-size:.78rem;color:#7070a0;margin-top:4px;line-height:1.5}
.card-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0;align-items:center}
.btn-tick{background:none;border:2px solid #d0d0e8;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .18s;color:transparent}
.btn-tick:hover{border-color:#22c55e;background:#f0fdf4;color:#22c55e}
.btn-tick.active{background:#22c55e;border-color:#22c55e;color:#fff}
.btn-trash{background:none;border:none;font-size:1rem;cursor:pointer;color:#d0d0e8;padding:4px;border-radius:7px;transition:all .15s}
.btn-trash:hover{color:#ef4444;background:#fef2f2}
.overlay{position:fixed;inset:0;background:rgba(30,20,60,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:16px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;padding:1.5rem;box-shadow:0 20px 60px rgba(99,102,241,.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-header h2{font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#c0c0d8}
.modal-close:hover{color:#6366f1}
.ev-item{border:1px solid #ede9fe;border-radius:10px;padding:9px 11px;margin-bottom:7px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;background:#faf9ff}
.ev-item.done{background:#f0fdf4;border-color:#bbf7d0}
.ev-item-info{flex:1;min-width:0}
.ev-item-title{font-size:.84rem;font-weight:600;display:flex;align-items:center;gap:6px}
.ev-item.done .ev-item-title{text-decoration:line-through;color:#6b7280}
.ev-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ev-item-meta{font-size:.73rem;color:#a0a0b8;margin-top:2px}
.ev-actions{display:flex;gap:4px;flex-shrink:0}
.btn-sm{background:none;border:1px solid #e8e6f8;border-radius:7px;padding:3px 9px;font-size:.72rem;cursor:pointer;color:#7070a0;font-weight:500;transition:all .12s}
.btn-sm:hover{background:#ede9fe;border-color:#c4b5fd;color:#6366f1}
.btn-sm.danger:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.sep{border:none;border-top:1px solid #ede9fe;margin:.9rem 0}
.form-group{margin-bottom:.7rem}
label{font-size:.78rem;color:#7070a0;display:block;margin-bottom:3px;font-weight:500}
input,select,textarea{width:100%;border:1.5px solid #e8e6f8;border-radius:9px;padding:8px 11px;font-size:.85rem;font-family:inherit;background:#faf9ff;color:#1a1a2e;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#8b5cf6;background:#fff}
textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-primary{background:linear-gradient(90deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:.85rem;font-weight:600;cursor:pointer;width:100%;margin-top:.5rem;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-add{background:none;border:1.5px dashed #c4b5fd;border-radius:10px;padding:7px;font-size:.8rem;color:#a0a0c8;cursor:pointer;width:100%;margin-bottom:.5rem;font-weight:500;transition:all .15s}
.btn-add:hover{border-color:#8b5cf6;color:#6366f1;background:#faf9ff}
</style>
</head>
<body>

<div class="header">
  <button class="nav-btn" id="prev">‹</button>
  <h1 id="month-label"></h1>
  <button class="nav-btn" id="next">›</button>
  <button class="nav-btn today-btn" id="todayBtn">Hoy</button>
  <span class="sync-label"><span class="sync-dot" id="syncDot"></span><span id="syncText">conectando...</span></span>
</div>

<div class="facturacion-bar">
  <div class="fact-top">
    <div>
      <div class="fact-label">💰 Facturación mensual</div>
      <div class="fact-amount" id="factAmount">0,00 €</div>
    </div>
    <span class="fact-days" id="factDays">0 días con caja</span>
  </div>
  <div class="fact-bottom">
    <div class="fact-sub efectivo">
      <span class="fact-sub-icon">💵</span>
      <div class="fact-sub-body">
        <div class="fact-sub-label">Efectivo</div>
        <div class="fact-sub-amount" id="factEfectivo">0,00 €</div>
      </div>
    </div>
    <div class="fact-sub datafono">
      <span class="fact-sub-icon">💳</span>
      <div class="fact-sub-body">
        <div class="fact-sub-label">Datáfono</div>
        <div class="fact-sub-amount" id="factDatafono">0,00 €</div>
      </div>
    </div>
  </div>
</div>

<div class="legend">
  <span class="leg"><span class="leg-dot" style="background:#6366f1"></span>Turno</span>
  <span class="leg"><span class="leg-dot" style="background:#22c55e"></span>Reunión</span>
  <span class="leg"><span class="leg-dot" style="background:#f59e0b"></span>Tarea</span>
  <span class="leg"><span class="leg-dot" style="background:#ef4444"></span>Urgente</span>
  <span class="leg"><span class="leg-dot" style="background:#8b5cf6"></span>Festivo</span>
  <span class="leg"><span class="leg-dot" style="background:#9ca3af"></span>Otro</span>
  <span class="leg"><span class="leg-dot" style="background:#22c55e"></span>💰 Caja anotada</span>
</div>

<div class="grid-head">
  <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span>
  <span style="color:#8b5cf6">Sáb</span><span style="color:#8b5cf6">Dom</span>
</div>
<div class="grid" id="cal"></div>

<div id="dayPanel">
  <div class="panel-header">
    <h2 id="panelTitle"></h2>
    <button class="panel-close" id="panelClose">×</button>
  </div>
  <div class="caja-section">
    <div class="caja-section-title">💰 Caja del día</div>
    <div class="caja-fields">
      <div>
        <div class="caja-field-label">💵 Efectivo</div>
        <div class="caja-input-row">
          <span class="caja-prefix">€</span>
          <input class="caja-input" type="number" id="cajaEfectivo" placeholder="0,00" min="0" step="0.01">
        </div>
      </div>
      <div>
        <div class="caja-field-label">💳 Datáfono</div>
        <div class="caja-input-row">
          <span class="caja-prefix">€</span>
          <input class="caja-input" type="number" id="cajaDatafono" placeholder="0,00" min="0" step="0.01">
        </div>
      </div>
    </div>
    <div class="caja-total-row">
      <span class="caja-total-label">Total del día</span>
      <span class="caja-total-amount" id="cajaTotalPreview">0,00 €</span>
    </div>
    <button class="btn-caja-save" id="btnCajaGuardar">Guardar caja</button>
    <div id="cajaSavedInfo" style="display:none" class="caja-saved">
      <div class="caja-saved-main">
        ✓ Total anotado: <strong id="cajaSavedTotal"></strong>
        <div class="caja-saved-subs">
          <span>💵 Efectivo: <strong id="cajaSavedEf"></strong></span>
          <span>💳 Datáfono: <strong id="cajaSavedDf"></strong></span>
        </div>
      </div>
      <button class="btn-caja-del" id="btnCajaDel">× Borrar</button>
    </div>
  </div>
  <div id="panelList"></div>
</div>

<div class="overlay" id="overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalDate"></h2>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div id="evList"></div>
    <button class="btn-add" id="btnAdd">+ Añadir evento</button>
    <div id="formWrap" style="display:none">
      <hr class="sep">
      <div class="form-group">
        <label>Título *</label>
        <input id="fTitle" type="text" placeholder="Nombre del evento">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Responsable</label>
          <input id="fResp" type="text" placeholder="Quién">
        </div>
        <div class="form-group">
          <label>Hora</label>
          <input id="fHora" type="time">
        </div>
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="fCat">
          <option value="Turno">Turno</option>
          <option value="Reunión">Reunión</option>
          <option value="Tarea">Tarea</option>
          <option value="Urgente">Urgente</option>
          <option value="Festivo">Festivo</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nota</label>
        <textarea id="fNota" placeholder="Notas adicionales..."></textarea>
      </div>
      <button class="btn-primary" id="btnSave">Guardar evento</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyB1fM5yajSzHp5c9CPHCENGeDPH5dhUriU",
  authDomain: "calendario-1627f.firebaseapp.com",
  projectId: "calendario-1627f",
  storageBucket: "calendario-1627f.firebasestorage.app",
  messagingSenderId: "451120236056",
  appId: "1:451120236056:web:346cef5c859b94da7f256d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, 'calendario', 'eventos');

const CAT_COLORS={Turno:'#6366f1',Reunión:'#22c55e',Tarea:'#f59e0b',Urgente:'#ef4444',Festivo:'#8b5cf6',Otro:'#9ca3af'};
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let evs={}, cajas={}, cur=new Date(), selDate=null, editId=null;
const $=id=>document.getElementById(id);
const fmt=n=>parseFloat(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';

function setSyncStatus(s){
  const dot=$('syncDot'),txt=$('syncText');
  if(s==='ok'){dot.className='sync-dot';txt.textContent='sincronizado';}
  else if(s==='saving'){dot.className='sync-dot stale';txt.textContent='guardando...';}
  else{dot.className='sync-dot stale';txt.textContent='sin conexión';}
}

async function save(){
  setSyncStatus('saving');
  try{await setDoc(DOC_REF,{data:JSON.stringify(evs),cajas:JSON.stringify(cajas)});setSyncStatus('ok');}
  catch(e){setSyncStatus('error');}
}

onSnapshot(DOC_REF,function(snap){
  if(snap.exists()){
    evs=JSON.parse(snap.data().data||'{}');
    cajas=JSON.parse(snap.data().cajas||'{}');
  }
  setSyncStatus('ok');
  render();
  if(selDate&&$('dayPanel').style.display==='block') openPanel(selDate);
},function(){setSyncStatus('error');});

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function dateKey(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}

function getMonthTotals(){
  const y=cur.getFullYear(),m=cur.getMonth();
  let total=0,efectivo=0,datafono=0,dias=0;
  Object.keys(cajas).forEach(function(k){
    const p=k.split('-').map(Number);
    if(p[0]===y&&p[1]-1===m&&cajas[k]){
      const c=cajas[k];
      const ef=parseFloat(c.efectivo||0);
      const df=parseFloat(c.datafono||0);
      if(ef+df>0){efectivo+=ef;datafono+=df;total+=ef+df;dias++;}
    }
  });
  return{total,efectivo,datafono,dias};
}

function updateFacturacion(){
  const{total,efectivo,datafono,dias}=getMonthTotals();
  $('factAmount').textContent=fmt(total);
  $('factEfectivo').textContent=fmt(efectivo);
  $('factDatafono').textContent=fmt(datafono);
  $('factDays').textContent=dias+(dias===1?' día con caja':' días con caja');
}

function updateCajaPreview(){
  const ef=parseFloat($('cajaEfectivo').value)||0;
  const df=parseFloat($('cajaDatafono').value)||0;
  $('cajaTotalPreview').textContent=fmt(ef+df);
}

$('cajaEfectivo').addEventListener('input',updateCajaPreview);
$('cajaDatafono').addEventListener('input',updateCajaPreview);

function toggleDone(id){
  if(!evs[selDate])return;
  const ev=evs[selDate].find(function(e){return e.id===id;});
  if(!ev)return;ev.done=!ev.done;save();
}

function render(){
  updateFacturacion();
  const y=cur.getFullYear(),m=cur.getMonth();
  $('month-label').textContent=MONTHS[m]+' '+y;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const start=(first.getDay()+6)%7;
  const today=new Date();
  const cells=[];
  for(let i=0;i<start;i++){const d=new Date(y,m,1-start+i);cells.push({d,other:true});}
  for(let d=1;d<=last.getDate();d++)cells.push({d:new Date(y,m,d),other:false});
  while(cells.length%7!==0){const p=cells[cells.length-1].d,nd=new Date(p);nd.setDate(nd.getDate()+1);cells.push({d:nd,other:true});}
  const cal=$('cal');cal.innerHTML='';
  cells.forEach(function(cell){
    const d=cell.d,other=cell.other;
    const wd=d.getDay(),isWE=wd===0||wd===6;
    const isToday=d.toDateString()===today.toDateString();
    const k=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
    const dayEvs=evs[k]||[];
    const caja=cajas[k];
    const tieneCaja=!other&&caja&&(parseFloat(caja.efectivo||0)+parseFloat(caja.datafono||0))>0;
    const div=document.createElement('div');
    div.className='day'+(other?' other':'')+(isWE?' weekend':'')+(isToday?' today':'');
    const numEl=document.createElement('div');numEl.className='day-num';numEl.textContent=d.getDate();
    div.appendChild(numEl);
    const bp=document.createElement('button');bp.className='btn-plus';bp.textContent='+';bp.title='Añadir evento';
    bp.addEventListener('click',function(e){e.stopPropagation();openModal(k);});
    div.appendChild(bp);
    const sorted=[...dayEvs].sort(function(a,b){return(a.hora||'23:59').localeCompare(b.hora||'23:59');});
    sorted.slice(0,3).forEach(function(ev){
      const pill=document.createElement('div');
      pill.className='ev-pill'+(ev.done?' done':'');
      pill.style.background=CAT_COLORS[ev.cat]||'#9ca3af';
      if(ev.done){const tick=document.createElement('span');tick.className='pill-tick';tick.textContent='✓';pill.appendChild(tick);}
      const txt=document.createElement('span');txt.textContent=(ev.hora?ev.hora+' ':'')+ev.title;txt.style.overflow='hidden';txt.style.textOverflow='ellipsis';
      pill.appendChild(txt);
      pill.addEventListener('click',function(e){e.stopPropagation();openPanel(k);});
      div.appendChild(pill);
    });
    if(dayEvs.length>3){const m2=document.createElement('div');m2.className='more';m2.textContent='+'+(dayEvs.length-3)+' más';div.appendChild(m2);}
    if(tieneCaja){
      const total=parseFloat(caja.efectivo||0)+parseFloat(caja.datafono||0);
      const badge=document.createElement('div');badge.className='caja-badge';
      badge.textContent='💰 '+total.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+'€';
      div.appendChild(badge);
    }
    div.addEventListener('click',function(){openPanel(k);});
    cal.appendChild(div);
  });
}

function openPanel(k){
  selDate=k;
  const dayEvs=evs[k]||[];
  const parts=k.split('-').map(Number);
  $('panelTitle').textContent=parts[2]+' de '+MONTHS[parts[1]-1]+' de '+parts[0];
  const caja=cajas[k];
  if(caja&&(parseFloat(caja.efectivo||0)+parseFloat(caja.datafono||0))>0){
    const ef=parseFloat(caja.efectivo||0);
    const df=parseFloat(caja.datafono||0);
    $('cajaEfectivo').value=ef||'';
    $('cajaDatafono').value=df||'';
    $('cajaTotalPreview').textContent=fmt(ef+df);
    $('cajaSavedInfo').style.display='flex';
    $('cajaSavedTotal').textContent=fmt(ef+df);
    $('cajaSavedEf').textContent=fmt(ef);
    $('cajaSavedDf').textContent=fmt(df);
  }else{
    $('cajaEfectivo').value='';
    $('cajaDatafono').value='';
    $('cajaTotalPreview').textContent='0,00 €';
    $('cajaSavedInfo').style.display='none';
  }
  const list=$('panelList');list.innerHTML='';
  if(!dayEvs.length){
    list.innerHTML='<p class="panel-empty">Sin eventos para este día.</p>';
  }else{
    const sorted=[...dayEvs].sort(function(a,b){return(a.hora||'23:59').localeCompare(b.hora||'23:59');});
    sorted.forEach(function(ev){
      const c=CAT_COLORS[ev.cat]||'#9ca3af';
      const card=document.createElement('div');card.className='ev-card'+(ev.done?' done':'');
      const bar=document.createElement('div');bar.className='ev-card-bar';bar.style.background=ev.done?'#22c55e':c;
      const body=document.createElement('div');body.className='ev-card-body';
      const top=document.createElement('div');top.className='ev-card-top';
      const badge=document.createElement('span');badge.className='ev-cat-badge';badge.style.background=ev.done?'#22c55e':c;badge.textContent=ev.done?'✓ Hecho':ev.cat;
      top.appendChild(badge);
      if(ev.hora){const t=document.createElement('span');t.className='ev-time';t.textContent=ev.hora;top.appendChild(t);}
      if(ev.resp){const r=document.createElement('span');r.className='ev-resp';r.textContent='· '+ev.resp;top.appendChild(r);}
      body.appendChild(top);
      const title=document.createElement('div');title.className='ev-title';title.textContent=ev.title;body.appendChild(title);
      if(ev.nota){const n=document.createElement('div');n.className='ev-nota';n.textContent=ev.nota;body.appendChild(n);}
      const btns=document.createElement('div');btns.className='card-btns';
      const tick=document.createElement('button');tick.className='btn-tick'+(ev.done?' active':'');
      tick.title=ev.done?'Marcar como pendiente':'Marcar como hecho';tick.textContent='✓';
      tick.addEventListener('click',function(e){e.stopPropagation();toggleDone(ev.id);});
      const trash=document.createElement('button');trash.className='btn-trash';trash.title='Borrar';trash.textContent='🗑';
      trash.addEventListener('click',function(e){e.stopPropagation();delEv(ev.id);openPanel(k);});
      btns.appendChild(tick);btns.appendChild(trash);
      card.appendChild(bar);card.appendChild(body);card.appendChild(btns);
      list.appendChild(card);
    });
  }
  $('dayPanel').style.display='block';
  $('dayPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

$('btnCajaGuardar').addEventListener('click',function(){
  if(!selDate)return;
  const ef=parseFloat($('cajaEfectivo').value)||0;
  const df=parseFloat($('cajaDatafono').value)||0;
  if(ef+df<=0)return;
  cajas[selDate]={efectivo:ef,datafono:df};
  save();
  $('cajaSavedInfo').style.display='flex';
  $('cajaSavedTotal').textContent=fmt(ef+df);
  $('cajaSavedEf').textContent=fmt(ef);
  $('cajaSavedDf').textContent=fmt(df);
  updateFacturacion();render();
});

$('btnCajaDel').addEventListener('click',function(){
  if(!selDate)return;
  delete cajas[selDate];
  $('cajaEfectivo').value='';$('cajaDatafono').value='';
  $('cajaTotalPreview').textContent='0,00 €';
  $('cajaSavedInfo').style.display='none';
  save();updateFacturacion();render();
});

function openModal(k){
  selDate=k;editId=null;
  $('formWrap').style.display='none';$('btnAdd').style.display='';clearForm();
  const parts=k.split('-').map(Number);
  $('modalDate').textContent=parts[2]+' de '+MONTHS[parts[1]-1]+' de '+parts[0];
  renderEvList();$('overlay').style.display='flex';
}

function renderEvList(){
  const list=$('evList');list.innerHTML='';
  const dayEvs=evs[selDate]||[];
  if(!dayEvs.length){list.innerHTML='<p style="font-size:.8rem;color:#c0c0d8;margin-bottom:.5rem">Sin eventos</p>';return;}
  dayEvs.forEach(function(ev){
    const item=document.createElement('div');item.className='ev-item'+(ev.done?' done':'');
    const info=document.createElement('div');info.className='ev-item-info';
    const titleRow=document.createElement('div');titleRow.className='ev-item-title';
    const dot=document.createElement('span');dot.className='ev-item-dot';dot.style.background=CAT_COLORS[ev.cat]||'#9ca3af';
    titleRow.appendChild(dot);titleRow.appendChild(document.createTextNode(ev.title));
    const meta=document.createElement('div');meta.className='ev-item-meta';
    meta.textContent=ev.cat+(ev.hora?' · '+ev.hora:'')+(ev.resp?' · '+ev.resp:'')+(ev.done?' · ✓ Hecho':'');
    info.appendChild(titleRow);info.appendChild(meta);
    if(ev.nota){const n=document.createElement('div');n.className='ev-item-meta';n.style.marginTop='2px';n.textContent=ev.nota;info.appendChild(n);}
    const acts=document.createElement('div');acts.className='ev-actions';
    const be=document.createElement('button');be.className='btn-sm';be.textContent='Editar';
    be.addEventListener('click',function(){startEdit(ev.id);});
    const bd=document.createElement('button');bd.className='btn-sm danger';bd.textContent='Borrar';
    bd.addEventListener('click',function(){delEv(ev.id);renderEvList();if(selDate)openPanel(selDate);});
    acts.appendChild(be);acts.appendChild(bd);
    item.appendChild(info);item.appendChild(acts);
    list.appendChild(item);
  });
}

function startEdit(id){
  editId=id;
  const ev=(evs[selDate]||[]).find(function(e){return e.id===id;});if(!ev)return;
  $('fTitle').value=ev.title;$('fResp').value=ev.resp||'';$('fHora').value=ev.hora||'';
  $('fCat').value=ev.cat;$('fNota').value=ev.nota||'';
  $('formWrap').style.display='';$('btnAdd').style.display='none';
}

function delEv(id){
  if(!evs[selDate])return;
  evs[selDate]=evs[selDate].filter(function(e){return e.id!==id;});
  if(!evs[selDate].length)delete evs[selDate];
  save();render();
}

function clearForm(){['fTitle','fResp','fHora','fNota'].forEach(function(id){$(id).value='';});$('fCat').value='Turno';}

$('btnAdd').addEventListener('click',function(){editId=null;clearForm();$('formWrap').style.display='';$('btnAdd').style.display='none';});
$('btnSave').addEventListener('click',function(){
  const title=$('fTitle').value.trim();if(!title)return $('fTitle').focus();
  const existing=(evs[selDate]||[]).find(function(e){return e.id===editId;});
  const ev={id:editId||uid(),title,resp:$('fResp').value.trim(),hora:$('fHora').value,cat:$('fCat').value,nota:$('fNota').value.trim(),done:existing?existing.done:false};
  if(!evs[selDate])evs[selDate]=[];
  if(editId){const idx=evs[selDate].findIndex(function(e){return e.id===editId;});if(idx>-1)evs[selDate][idx]=ev;}
  else evs[selDate].push(ev);
  save();editId=null;clearForm();
  $('formWrap').style.display='none';$('btnAdd').style.display='';
  renderEvList();
});

$('modalClose').addEventListener('click',function(){$('overlay').style.display='none';});
$('overlay').addEventListener('click',function(e){if(e.target===$('overlay'))$('overlay').style.display='none';});
$('panelClose').addEventListener('click',function(){$('dayPanel').style.display='none';selDate=null;});
$('prev').addEventListener('click',function(){cur=new Date(cur.getFullYear(),cur.getMonth()-1,1);$('dayPanel').style.display='none';render();});
$('next').addEventListener('click',function(){cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);$('dayPanel').style.display='none';render();});
$('todayBtn').addEventListener('click',function(){cur=new Date();$('dayPanel').style.display='none';render();});
</script>
</body>
</html>
